version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 99
  versioning-strategy: increase
  groups:
    avo:
      patterns: ["avo", "avo-*"]
    rubocop:
      patterns: ["rubocop", "rubocop-*"]
    rails:
      patterns: ["rails", "active*", "action*", "railties"]
    aws:
      patterns: ["aws-*"]
    flipper:
      patterns: ["flipper*"]
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 99
  groups:
    github-actions-patch-minor:
      patterns: ["*"]
      update-types:
        - patch
        - minor
- package-ecosystem: devcontainers
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 99
  cooldown:
    default-days: 7
